<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ansh Patel — Full Stack Developer &amp; UI/UX Designer from Gandhinagar, Gujarat. Building scalable web apps with React, Node.js, and modern AI integration." />
    <meta name="theme-color" content="#030712" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./src/assets/logo.png" />

    <!-- Preconnect to critical third-party origins first -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload Hero image for instant LCP -->
    <link rel="preload" as="image" href="/photo.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/logo.png" fetchpriority="high" />

    <!-- Critical CSS & Fonts — using display=swap to avoid rendering block -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <title>Ansh Patel — Full Stack Developer &amp; UI/UX Designer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
