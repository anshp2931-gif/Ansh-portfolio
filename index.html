<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ansh Patel — Full Stack Developer &amp; UI/UX Designer from Gandhinagar, Gujarat. Building scalable web apps with React, Node.js, and modern AI integration." />
    <meta name="theme-color" content="#060b18" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./src/assets/logo.png" />

    <!-- Preconnect to critical third-party origins first -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Load font asynchronously (non-render-blocking) with font-display=swap so
      text is visible immediately using a fallback while Inter downloads.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <!-- Noscript fallback for browsers without JS -->
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <title>Ansh Patel — Full Stack Developer &amp; UI/UX Designer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
